<!DOCTYPE html>
<html>

<head>
  <title>AttentionX</title>

  <!-- Pico.css = instant styling, no effort -->
  <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@latest/css/pico.min.css">
</head>

<body>

<main class="container">
  <h1>🎬 AttentionX</h1>
  <p>Upload a long video → get short clips</p>

  <!-- File upload form -->
  <form id="uploadForm">
    <!-- Input for selecting video -->
    <input type="file" name="file" required />

    <!-- Submit button -->
    <button type="submit">Upload & Process</button>
  </form>

  <!-- Status message (Processing / Done) -->
  <p id="status"></p>

  <!-- Video player (hidden initially) -->
  <video id="outputVideo" controls style="display:none; width:300px;"></video>
</main>

<script>
/*
  When user submits form:
  - Prevent page reload
  - Send video to backend
  - Receive processed clip
  - Display it
*/
document.getElementById("uploadForm").onsubmit = async (e) => {
  e.preventDefault(); // stop page refresh

  const status = document.getElementById("status");
  status.innerText = "Processing... ⏳";

  // Collect form data (video file)
  const formData = new FormData(e.target);

  // Send POST request to backend
  const res = await fetch("http://localhost:8000/upload", {
    method: "POST",
    body: formData
  });

  // Convert response to JSON
  const data = await res.json();

  status.innerText = "Done! ✅";

  // Show output video
  const video = document.getElementById("outputVideo");
  video.src = data.video_url;   // set video source
  video.style.display = "block"; // make visible
};
</script>

</body>
</html>
